name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  EXPO_NO_TELEMETRY: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  npm_config_virtual_store_dir: .pnpm-store-ci

jobs:
  workspace-checks:
    name: Workspace Checks
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Typecheck shared package
        run: corepack pnpm --filter @nouvelle-app/shared typecheck

      - name: Typecheck mobile app
        run: corepack pnpm --filter @nouvelle-app/mobile typecheck

      - name: Validate fenix Connect IQ skeleton
        run: pwsh -NoProfile -File .\watch-apps\fenix-connect-iq\scripts\validate-structure.ps1

      - name: Validate edge Connect IQ skeleton
        run: pwsh -NoProfile -File .\watch-apps\edge-connect-iq\scripts\validate-structure.ps1
