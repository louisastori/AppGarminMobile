name: Build Artifacts

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  EXPO_NO_TELEMETRY: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  npm_config_virtual_store_dir: .pnpm-store-ci

jobs:
  workspace-build:
    name: Workspace Build
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build workspace
        run: corepack pnpm build

      - name: Upload mobile export artifact
        uses: actions/upload-artifact@v4
        with:
          name: nouvelle-app-mobile-export
          path: apps/mobile/dist/
          if-no-files-found: error

      - name: Upload API build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nouvelle-app-api-build
          path: apps/api/dist/
          if-no-files-found: error

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nouvelle-app-web-build
          path: apps/web/dist/
          if-no-files-found: error

      - name: Upload fenix Connect IQ artifact
        if: ${{ hashFiles('watch-apps/fenix-connect-iq/bin/*.prg') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: fenix-connect-iq-prg
          path: watch-apps/fenix-connect-iq/bin/
          if-no-files-found: error

      - name: Upload edge Connect IQ artifact
        if: ${{ hashFiles('watch-apps/edge-connect-iq/bin/*.prg') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: edge-connect-iq-prg
          path: watch-apps/edge-connect-iq/bin/
          if-no-files-found: error
